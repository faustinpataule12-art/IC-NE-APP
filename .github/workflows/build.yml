name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: 📦 Get dependencies
        run: flutter pub get
      - name: 🔧 Patch win32 for Dart 3.x
        run: |
          find "$HOME/.pub-cache" -path "*/win32-*/lib/src/guid.dart" | while read f; do
            sed -i 's/UnmodifiableUint8ListView/Uint8List/g' "$f"
            echo "Patched: $f"
          done
      - name: 🏗️ Build APK
        run: flutter build apk --release --no-tree-shake-icons
      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "ICÔNE-APP v${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
