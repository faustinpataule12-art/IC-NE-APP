name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: 🏗️ Build APK (release)
        run: flutter build apk --release --no-tree-shake-icons

      - name: 🏗️ Build APK (debug)
        run: flutter build apk --debug

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ICONE-APP-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ICONE-APP-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: 🚀 Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "ICÔNE-APP v${{ github.run_number }}"
          body: |
            ## ICÔNE-APP by NPS.NELSON
            
            ✅ Build automatique — push #${{ github.run_number }}
            
            ### Télécharger
            - **app-release.apk** → Version finale (recommandée)
            - **app-debug.apk** → Version debug
            
            ---
            📧 nelsonpataule11@gmail.com  
            💬 WhatsApp : +243 981 083 202
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
