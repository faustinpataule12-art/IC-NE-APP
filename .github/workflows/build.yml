name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: 📦 Get dependencies
        run: flutter pub get
      - name: 🔧 Patch win32 compatibility (Dart 3.x)
        run: |
          WIN32_GUID="$HOME/.pub-cache/hosted/pub.dev/win32-$(cat pubspec.lock | grep -A2 'win32:' | grep version | head -1 | grep -oP '[0-9]+\.[0-9]+\.[0-9]+')/lib/src/guid.dart"
          if [ -f "$WIN32_GUID" ]; then
            sed -i 's/UnmodifiableUint8ListView/Uint8List/g' "$WIN32_GUID"
            echo "✅ Patched win32 guid.dart"
          else
            echo "ℹ️ win32 guid.dart not found, skipping patch"
          fi
      - name: 🏗️ Build APK
        run: flutter build apk --release --no-tree-shake-icons
      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "ICÔNE-APP v${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
