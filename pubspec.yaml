name: icone_app
description: Personnaliser les icônes et splash screen des APK - by NPS.NELSON
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^6.1.1
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  archive: ^3.4.10
  xml: ^6.5.0
  image: ^4.1.7
  flutter_colorpicker: ^1.0.3
  google_fonts: ^6.1.0
  lottie: ^3.1.0
  share_plus: ^7.2.2
  open_file: ^3.3.2
  flutter_svg: ^2.0.10+1
  dio: ^5.4.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/
